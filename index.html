<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCADA Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0b1220;
      color: white;
      overflow-x: hidden;
    }

    .topbar {
      width: 100%;
      height: 70px;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 2px solid #1f2937;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      color: #00e5ff;
    }

    .status {
      display: flex;
      gap: 15px;
    }

    .status-box {
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
    }

    .online {
      background: #065f46;
      color: #6ee7b7;
    }

    .alarm {
      background: #7f1d1d;
      color: #fca5a5;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .card h2 {
      margin-bottom: 20px;
      color: #00e5ff;
      font-size: 20px;
    }

    .sensor-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .sensor {
      background: #0f172a;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #1e293b;
    }

    .sensor h3 {
      font-size: 15px;
      margin-bottom: 10px;
      color: #94a3b8;
    }

    .value {
      font-size: 30px;
      font-weight: bold;
      color: #22d3ee;
    }

    .unit {
      color: #64748b;
      font-size: 14px;
    }

    .machine {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f172a;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      border: 1px solid #1e293b;
    }

    .indicator {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: lime;
      box-shadow: 0 0 15px lime;
    }

    .indicator.off {
      background: red;
      box-shadow: 0 0 15px red;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #00bcd4;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0097a7;
    }

    .chart-container {
      height: 300px;
    }

    .slider-container {
      margin-top: 20px;
      background: #0f172a;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #1e293b;
    }

    .slider-container label {
      display: block;
      margin-bottom: 10px;
      color: #94a3b8;
      font-size: 14px;
    }

    .slider-value {
      font-size: 24px;
      color: #22d3ee;
      font-weight: bold;
      margin-top: 10px;
      text-align: center;
    }

    input[type=range] {
      width: 100%;
      cursor: pointer;
    }

    .big-buttons {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .big-btn {
      padding: 18px;
      font-size: 16px;
      border-radius: 14px;
      font-weight: bold;
    }

    .green {
      background: #15803d;
    }

    .red {
      background: #b91c1c;
    }

    .orange {
      background: #c2410c;
    }

    .blue {
      background: #0369a1;
    }

    .tank {
      width: 100%;
      height: 220px;
      border: 3px solid #334155;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      background: #020617;
      margin-top: 20px;
    }

    .liquid {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: linear-gradient(to top, #0284c7, #38bdf8);
      height: 82%;
      transition: 0.5s;
    }

    .tank-label {
      position: absolute;
      width: 100%;
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      font-weight: bold;
      z-index: 10;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
    }

    @media(max-width: 768px){
      .sensor-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        height: auto;
        padding: 15px;
        gap: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="title">MaiaWebView</div>

    <div class="status">
      <div class="status-box online">Sistema Online</div>
      <div class="status-box" id="clock">00:00:00</div>
    </div>
  </div>

  <div class="container">

    <div class="card">
      <h2>Sensores</h2>

      <div class="sensor-grid">

        <div class="sensor">
          <h3>Temperatura</h3>
          <div class="value" id="temp">25</div>
          <div class="unit">°C</div>
        </div>

        <div class="sensor">
          <h3>Pressão</h3>
          <div class="value" id="press">4.5</div>
          <div class="unit">bar</div>
        </div>

        <div class="sensor">
          <h3>Vazão</h3>
          <div class="value" id="flow">120</div>
          <div class="unit">L/min</div>
        </div>

        <div class="sensor">
          <h3>Nível</h3>
          <div class="value" id="level">82</div>
          <div class="unit">%</div>
        </div>

      </div>
    </div>

    <div class="card">
      <h2>Máquinas</h2>

      <div class="machine">
        <span>Bomba 1</span>
        <div class="indicator" id="m1"></div>
      </div>

      <div class="machine">
        <span>Bomba 2</span>
        <div class="indicator" id="m2"></div>
      </div>

      <div class="machine">
        <span>Ventilador</span>
        <div class="indicator off" id="m3"></div>
      </div>

      <div class="buttons">
        <button onclick="toggleMachine('m1')">Bomba 1</button>
        <button onclick="toggleMachine('m2')">Bomba 2</button>
      </div>

    </div>

    <div class="card">
      <h2>Histórico</h2>
      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>Controle Industrial</h2>

      <div class="slider-container">
        <label>Velocidade do Motor</label>
        <input type="range" min="0" max="100" value="50" id="sliderMotor" oninput="updateSlider(this.value)">
        <div class="slider-value" id="sliderValue">50%</div>
      </div>

      <div class="big-buttons">
        <button class="big-btn green" onclick="enviarComando('START')">START</button>
        <button class="big-btn red" onclick="enviarComando('STOP')">STOP</button>
        <button class="big-btn orange" onclick="enviarComando('RESET')">RESET</button>
        <button class="big-btn blue" onclick="enviarComando('AUTO')">AUTO</button>
      </div>

      <div class="tank">
        <div class="liquid" id="tankLiquid"></div>
        <div class="tank-label" id="tankLabel">82%</div>
      </div>
    </div>

    <div class="card">
      <h2>Alarmes</h2>

      <div id="alarms">
        <div class="machine">
          <span>Temperatura Alta</span>
          <div class="indicator off"></div>
        </div>

        <div class="machine">
          <span>Baixa Pressão</span>
          <div class="indicator"></div>
        </div>
      </div>
    </div>

  </div>

  <div class="footer">
    Sistema Supervisório Industrial HTML + ESP32
  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <script>

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').innerHTML = now.toLocaleTimeString();
    }

    setInterval(updateClock, 1000);
    updateClock();

    function toggleMachine(id) {

      const elemento = document.getElementById(id);

      elemento.classList.toggle('off');

      let estado = elemento.classList.contains('off') ? '0' : '1';

      if(id === 'm1')
        client.publish(topicos.bomba1, estado);

      if(id === 'm2')
        client.publish(topicos.bomba2, estado);
    }

    const ctx = document.getElementById('chart').getContext('2d');

    const labels = [];
    const values = [];

    for(let i = 0; i < 20; i++) {
      labels.push(i);
      values.push(Math.random() * 100);
    }

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Temperatura',
          data: values,
          borderColor: '#00e5ff',
          backgroundColor: 'rgba(0,229,255,0.2)',
          borderWidth: 3,
          tension: 0.4,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: {
              color: 'white'
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: 'white'
            },
            grid: {
              color: '#1e293b'
            }
          },
          y: {
            ticks: {
              color: 'white'
            },
            grid: {
              color: '#1e293b'
            }
          }
        }
      }
    });

    function simulateData() {

      const temp = (20 + Math.random() * 15).toFixed(1);
      const press = (3 + Math.random() * 2).toFixed(1);
      const flow = (100 + Math.random() * 50).toFixed(0);
      const level = (70 + Math.random() * 20).toFixed(0);

      document.getElementById('temp').innerHTML = temp;
      document.getElementById('press').innerHTML = press;
      document.getElementById('flow').innerHTML = flow;
      document.getElementById('level').innerHTML = level;

      chart.data.labels.push(chart.data.labels.length);
      chart.data.datasets[0].data.push(temp);

      if(chart.data.labels.length > 20) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
      }

      chart.update();
    }

    // setInterval(simulateData, 2000);


    // ==================================================
    // CONFIGURAÇÃO MQTT
    // ==================================================

    const broker = 'wss://broker.hivemq.com:8884/mqtt';

    const topicos = {
      temperatura: 'LEITERIA_ABC/MQTTsalvo1',
      pressao: 'LEITERIA_ABC/MQTTsalvo2',
      vazao: 'compo/flow',
      nivel: 'compo/level',
      bomba1: 'compo/bomba1',
      bomba2: 'compo/bomba2',
      sliderMotorSalvar: 'LEITERIA_ABC/MQTTsalvar2',
      sliderMotorSalvo: 'LEITERIA_ABC/MQTTsalvo2',
      comandos: 'compo/comandos'
    };

    const client = mqtt.connect(broker);

    client.on('connect', () => {

      console.log('MQTT Conectado');

      client.subscribe(Object.values(topicos));

      document.querySelector('.online').innerHTML = 'MQTT Online';
    });

    client.on('message', (topic, message) => {

      const valor = message.toString();

      console.log(topic + ': ' + valor);

      if(topic === topicos.temperatura) {

        document.getElementById('temp').innerHTML = valor;

        chart.data.labels.push(chart.data.labels.length);
        chart.data.datasets[0].data.push(valor);

        if(chart.data.labels.length > 20) {
          chart.data.labels.shift();
          chart.data.datasets[0].data.shift();
        }

        chart.update();
      }

      if(topic === topicos.pressao)
        document.getElementById('press').innerHTML = valor;

      // MQTTsalvo2 = valor realmente aceito
      if(topic === topicos.sliderMotorSalvo) {

        document.getElementById('sliderMotor').value = valor;

        document.getElementById('sliderValue').innerHTML = valor + '%';
      }

      if(topic === topicos.vazao)
        document.getElementById('flow').innerHTML = valor;

      if(topic === topicos.nivel) {
        document.getElementById('level').innerHTML = valor;
        document.getElementById('tankLiquid').style.height = valor + '%';
        document.getElementById('tankLabel').innerHTML = valor + '%';
      }

      if(topic === topicos.bomba1) {

        if(valor === '1')
          document.getElementById('m1').classList.remove('off');
        else
          document.getElementById('m1').classList.add('off');
      }

      if(topic === topicos.bomba2) {

        if(valor === '1')
          document.getElementById('m2').classList.remove('off');
        else
          document.getElementById('m2').classList.add('off');
      }
    });


    // ==================================================
    // ENVIO DE COMANDOS MQTT
    // ==================================================

    function updateSlider(valor) {

      document.getElementById('sliderValue').innerHTML = valor + '%';

      document.getElementById('sliderMotor').value = valor;

      client.publish(topicos.sliderMotorSalvar, valor.toString());
    }

    function enviarComando(comando) {

      console.log('Comando enviado:', comando);

      client.publish(topicos.comandos, comando);
    }




    // ==================================================
    // FUNÇÃO PARA RECEBER DADOS DO APP INVENTOR / ESP32
    // ==================================================

    function ReceberData(json) {

      // EXEMPLO:
      // {
      //   "temp": 32,
      //   "press": 5.2,
      //   "flow": 140,
      //   "level": 76
      // }

      const data = JSON.parse(json);

      if(data.temp !== undefined)
        document.getElementById('temp').innerHTML = data.temp;

      if(data.press !== undefined)
        document.getElementById('press').innerHTML = data.press;

      if(data.flow !== undefined)
        document.getElementById('flow').innerHTML = data.flow;

      if(data.level !== undefined)
        document.getElementById('level').innerHTML = data.level;
    }

  </script>

</body>
</html>
