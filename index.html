<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MaiaWebView SCADA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0b1220;
  color:white;
}

/* LOGIN */

#loginScreen{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginBox{

  width:350px;
  background:#111827;
  padding:30px;
  border-radius:20px;
  border:1px solid #1f2937;
}

.loginBox h1{
  text-align:center;
  margin-bottom:20px;
  color:#00e5ff;
}

.loginBox input{

  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
}

.loginBox button{

  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#00bcd4;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.loginBox button:hover{
  background:#0097a7;
}

.erro{
  color:#ff6b6b;
  margin-top:15px;
  text-align:center;
}

/* DASHBOARD */

#dashboard{
  display:none;
}

.topbar{

  width:100%;
  height:70px;
  background:#111827;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:0 20px;

  border-bottom:2px solid #1f2937;
}

.title{
  font-size:28px;
  font-weight:bold;
  color:#00e5ff;
}

.status{
  display:flex;
  gap:10px;
}

.status-box{

  padding:10px 15px;
  border-radius:10px;
  font-weight:bold;
}

.online{
  background:#065f46;
  color:#6ee7b7;
}

.logout{
  background:#b91c1c;
  color:white;
  cursor:pointer;
}

.container{

  padding:20px;

  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}

.card{

  background:#111827;
  border-radius:20px;
  padding:20px;
  border:1px solid #1f2937;
}

.card h2{
  margin-bottom:20px;
  color:#00e5ff;
}

.sensor-grid{

  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.sensor{

  background:#0f172a;
  padding:15px;
  border-radius:15px;
  text-align:center;
}

.sensor h3{
  color:#94a3b8;
  margin-bottom:10px;
}

.value{
  font-size:32px;
  color:#22d3ee;
  font-weight:bold;
}

.unit{
  color:#64748b;
}

.machine{

  background:#0f172a;
  padding:15px;
  border-radius:15px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:12px;
}

.indicator{

  width:18px;
  height:18px;
  border-radius:50%;
  background:lime;

  box-shadow:0 0 15px lime;
}

.indicator.off{

  background:red;
  box-shadow:0 0 15px red;
}

.buttons{

  display:flex;
  gap:10px;
  margin-top:15px;
}

button{

  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00bcd4;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.chart-container{
  height:300px;
}

.slider-container{

  background:#0f172a;
  padding:15px;
  border-radius:15px;
}

.slider-value{

  text-align:center;
  margin-top:10px;
  font-size:24px;
  color:#22d3ee;
}

input[type=range]{
  width:100%;
}

.footer{
  text-align:center;
  padding:20px;
  color:#64748b;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="loginScreen">

  <div class="loginBox">

    <h1>LOGIN SCADA</h1>

    <input type="text" id="usuario" placeholder="Usuário">

    <input type="password" id="senha" placeholder="Senha">

    <button onclick="fazerLogin()">
      ENTRAR
    </button>

    <div class="erro" id="erro"></div>

  </div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

  <div class="topbar">

    <div class="title" id="localNome">
      MaiaWebView
    </div>

    <div class="status">

      <div class="status-box online">
        MQTT ONLINE
      </div>

      <div class="status-box" id="clock">
        00:00:00
      </div>

      <div class="status-box logout"
           onclick="logoff()">
        SAIR
      </div>

    </div>

  </div>

  <div class="container">

    <!-- SENSORES -->

    <div class="card">

      <h2>Sensores</h2>

      <div class="sensor-grid">

        <div class="sensor">
          <h3>Temperatura</h3>
          <div class="value" id="temp">0</div>
          <div class="unit">°C</div>
        </div>

        <div class="sensor">
          <h3>Pressão</h3>
          <div class="value" id="press">0</div>
          <div class="unit">bar</div>
        </div>

        <div class="sensor">
          <h3>Vazão</h3>
          <div class="value" id="flow">0</div>
          <div class="unit">L/min</div>
        </div>

        <div class="sensor">
          <h3>Nível</h3>
          <div class="value" id="level">0</div>
          <div class="unit">%</div>
        </div>

      </div>

    </div>

    <!-- MÁQUINAS -->

    <div class="card">

      <h2>Máquinas</h2>

      <div class="machine">
        <span>Bomba 1</span>
        <div class="indicator off" id="m1"></div>
      </div>

      <div class="machine">
        <span>Bomba 2</span>
        <div class="indicator off" id="m2"></div>
      </div>

      <div class="buttons">

        <button onclick="toggleMachine('m1')">
          BOMBA 1
        </button>

        <button onclick="toggleMachine('m2')">
          BOMBA 2
        </button>

      </div>

    </div>

    <!-- HISTÓRICO -->

    <div class="card">

      <h2>Histórico</h2>

      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>

    </div>

    <!-- CONTROLE -->

    <div class="card">

      <h2>Controle</h2>

      <div class="slider-container">

        <label>Velocidade</label>

        <input type="range"
               min="0"
               max="100"
               value="0"
               id="sliderMotor"
               oninput="updateSlider(this.value)">

        <div class="slider-value"
             id="sliderValue">
          0%
        </div>

      </div>

    </div>

  </div>

  <div class="footer">
    Sistema Supervisório Industrial
  </div>

</div>

<script>

const scriptURL =
'https://script.google.com/macros/s/AKfycbyknrxg1qQvwCe-EUYE1l8nRmWkCTDHuGibkzgOGbhFRYzlR-_iPEGpUDbmQryVAfd-/exec';

let client;
let topicos = {};

// RELÓGIO

function updateClock(){

  document.getElementById('clock')
  .innerHTML =
  new Date().toLocaleTimeString();
}

setInterval(updateClock,1000);

// LOGIN

async function fazerLogin(){

  const usuario =
  document.getElementById('usuario').value;

  const senha =
  document.getElementById('senha').value;

  try{

    const resposta =
    await fetch(
      scriptURL +
      '?nome=' + usuario +
      '&senha=' + senha
    );

    const dados =
    await resposta.json();

    if(dados.status !== 'OK'){

      document.getElementById('erro')
      .innerHTML = 'Login inválido';

      return;
    }

    // MOSTRA DASHBOARD

    document.getElementById('loginScreen')
    .style.display = 'none';

    document.getElementById('dashboard')
    .style.display = 'block';

    document.getElementById('localNome')
    .innerHTML = dados.local;

    // MQTT

    topicos = {

      // LEITURA

      temp: dados.mqttsalvo1,
      press: dados.mqttsalvo2,
      flow: dados.mqttsalvo3,
      level: dados.mqttsalvo4,

      leitura5: dados.mqttsalvo5,
      leitura6: dados.mqttsalvo6,
      leitura7: dados.mqttsalvo7,
      leitura8: dados.mqttsalvo8,
      leitura9: dados.mqttsalvo9,
      leitura10: dados.mqttsalvo10,

      // ESCRITA

      salvar1: dados.mqttsalvar11,
      salvar2: dados.mqttsalvar12,
      salvar3: dados.mqttsalvar13,
      salvar4: dados.mqttsalvar14,
      salvar5: dados.mqttsalvar15,
      salvar6: dados.mqttsalvar16,
      salvar7: dados.mqttsalvar17,
      salvar8: dados.mqttsalvar18,
      salvar9: dados.mqttsalvar19,
      salvar10: dados.mqttsalvar20
    };

    iniciarMQTT();

  }catch(erro){

    document.getElementById('erro')
    .innerHTML = 'Erro conexão';
  }
}

// LOGOFF

function logoff(){

  if(client)
    client.end();

  location.reload();
}

// MQTT

function iniciarMQTT(){

  client = mqtt.connect(
    'wss://broker.hivemq.com:8884/mqtt'
  );

  client.on('connect',()=>{

    console.log('MQTT conectado');

    client.subscribe([

      topicos.temp,
      topicos.press,
      topicos.flow,
      topicos.level,

      topicos.leitura5,
      topicos.leitura6,
      topicos.leitura7,
      topicos.leitura8,
      topicos.leitura9,
      topicos.leitura10
    ]);
  });

  client.on('message',(topic,message)=>{

    const valor =
    message.toString();

    console.log(topic,valor);

    if(topic === topicos.temp){

      document.getElementById('temp')
      .innerHTML = valor;

      addChart(valor);
    }

    if(topic === topicos.press){

      document.getElementById('press')
      .innerHTML = valor;
    }

    if(topic === topicos.flow){

      document.getElementById('flow')
      .innerHTML = valor;
    }

    if(topic === topicos.level){

      document.getElementById('level')
      .innerHTML = valor;
    }
  });
}

// BOTÕES

function toggleMachine(id){

  const el =
  document.getElementById(id);

  el.classList.toggle('off');

  let estado =
  el.classList.contains('off')
  ? '0'
  : '1';

  if(id === 'm1'){

    client.publish(
      topicos.salvar1,
      estado
    );
  }

  if(id === 'm2'){

    client.publish(
      topicos.salvar2,
      estado
    );
  }
}

// SLIDER

function updateSlider(valor){

  document.getElementById('sliderValue')
  .innerHTML = valor + '%';

  client.publish(
    topicos.salvar3,
    valor.toString()
  );
}

// GRÁFICO

const ctx =
document.getElementById('chart');

const grafico =
new Chart(ctx,{

  type:'line',

  data:{

    labels:[],

    datasets:[{

      label:'Temperatura',

      data:[],

      borderColor:'#00e5ff',

      backgroundColor:
      'rgba(0,229,255,0.2)',

      borderWidth:3,

      tension:0.4,

      fill:true
    }]
  },

  options:{

    responsive:true,

    maintainAspectRatio:false,

    plugins:{

      legend:{
        labels:{
          color:'white'
        }
      }
    },

    scales:{

      x:{
        ticks:{
          color:'white'
        }
      },

      y:{
        ticks:{
          color:'white'
        }
      }
    }
  }
});

function addChart(valor){

  grafico.data.labels.push('');

  grafico.data.datasets[0]
  .data.push(valor);

  if(grafico.data.labels.length > 20){

    grafico.data.labels.shift();

    grafico.data.datasets[0]
    .data.shift();
  }

  grafico.update();
}

</script>

</body>
</html>
