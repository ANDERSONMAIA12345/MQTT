<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MaiaWebView SCADA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0b1220;
  color:white;
}

/* LOGIN */

#login{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  width:350px;
  background:#111827;
  padding:30px;
  border-radius:20px;
  border:1px solid #1f2937;
}

.login-box h1{
  text-align:center;
  color:#22d3ee;
  margin-bottom:20px;
}

.login-box input{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
}

.login-box button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#0891b2;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* PAINEL */

#painel{
  display:none;
}

.topbar{
  width:100%;
  height:70px;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  border-bottom:2px solid #1f2937;
}

.title{
  font-size:28px;
  font-weight:bold;
  color:#22d3ee;
}

.status{
  display:flex;
  gap:10px;
  align-items:center;
}

.status-box{
  background:#0f172a;
  padding:10px 15px;
  border-radius:10px;
}

.logout-btn{

  background:#ff0000;

  color:white;

  border:none;

  padding:12px 20px;

  border-radius:12px;

  cursor:pointer;

  font-weight:bold;

  font-size:16px;

  box-shadow:0 0 15px red;

  transition:0.3s;
}

.logout-btn:hover{

  background:#cc0000;

  transform:scale(1.05);
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#111827;
  border-radius:20px;
  padding:20px;
  border:1px solid #1f2937;
}

.card h2{
  color:#22d3ee;
  margin-bottom:20px;
}

.sensor-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.sensor{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.value{
  font-size:30px;
  font-weight:bold;
  color:#22d3ee;
}

.machine{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.indicator{
  width:18px;
  height:18px;
  border-radius:50%;
  background:lime;
  box-shadow:0 0 15px lime;
}

.indicator.off{
  background:red;
  box-shadow:0 0 15px red;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.buttons button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0891b2;
  color:white;
  cursor:pointer;
}

.chart-container{
  height:300px;
}

.slider-container{
  margin-top:20px;
}

.slider-value{
  text-align:center;
  font-size:25px;
  margin-top:10px;
  color:#22d3ee;
}

input[type=range]{
  width:100%;
}

.big-buttons{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:20px;
}

.big-btn{
  padding:18px;
  border:none;
  border-radius:14px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.green{background:#15803d;}
.red{background:#b91c1c;}
.orange{background:#c2410c;}
.blue{background:#0369a1;}

.tank{
  width:100%;
  height:220px;
  background:#020617;
  border-radius:20px;
  overflow:hidden;
  margin-top:20px;
  position:relative;
  border:3px solid #334155;
}

.liquid{
  position:absolute;
  bottom:0;
  width:100%;
  height:0%;
  background:linear-gradient(to top,#0284c7,#38bdf8);
}

.tank-label{
  position:absolute;
  top:50%;
  width:100%;
  text-align:center;
  transform:translateY(-50%);
  font-size:30px;
  font-weight:bold;
}

</style>

</head>
<body>

<!-- LOGIN -->

<div id="login">

  <div class="login-box">

    <h1>MaiaWebView</h1>

    <input type="text" id="nome" placeholder="Usuário">

    <input type="password" id="senha" placeholder="Senha">

    <button onclick="fazerLogin()">
      ENTRAR
    </button>

  </div>

</div>

<!-- DASHBOARD -->

<div id="painel">

  <!-- TOPO -->

  <div class="topbar">

    <div class="title">
      MaiaWebView SCADA
    </div>

    <div class="status">

      <div class="status-box" id="localNome">
        LOCAL
      </div>

      <div class="status-box" id="clock">
        00:00:00
      </div>

      <button
        onclick="logout()"
        class="logout-btn"
      >
        ⛔ LOGOFF
      </button>

    </div>

  </div>

  <!-- CONTAINER -->

  <div class="container">

    <!-- SENSORES -->

    <div class="card">

      <h2>Sensores</h2>

      <div class="sensor-grid">

        <div class="sensor">
          <h3>Temperatura</h3>
          <div class="value" id="temp">0</div>
        </div>

        <div class="sensor">
          <h3>Pressão</h3>
          <div class="value" id="press">0</div>
        </div>

        <div class="sensor">
          <h3>Vazão</h3>
          <div class="value" id="flow">0</div>
        </div>

        <div class="sensor">
          <h3>Nível</h3>
          <div class="value" id="level">0</div>
        </div>

      </div>

    </div>

    <!-- MAQUINAS -->

    <div class="card">

      <h2>Máquinas</h2>

      <div class="machine">
        <span>Bomba 1</span>
        <div class="indicator off" id="m1"></div>
      </div>

      <div class="machine">
        <span>Bomba 2</span>
        <div class="indicator off" id="m2"></div>
      </div>

      <div class="buttons">

        <button onclick="toggleMachine('m1')">
          Bomba 1
        </button>

        <button onclick="toggleMachine('m2')">
          Bomba 2
        </button>

      </div>

    </div>

    <!-- GRAFICO -->

    <div class="card">

      <h2>Histórico</h2>

      <div class="chart-container">
        <canvas id="chart"></canvas>
      </div>

    </div>

    <!-- CONTROLE -->

    <div class="card">

      <h2>Controle</h2>

      <div class="slider-container">

        <input
          type="range"
          min="0"
          max="100"
          value="0"
          id="sliderMotor"
          oninput="updateSlider(this.value)"
        >

        <div class="slider-value" id="sliderValue">
          0%
        </div>

      </div>

      <div class="big-buttons">

        <button class="big-btn green"
        onclick="enviarComando('START')">
        START
        </button>

        <button class="big-btn red"
        onclick="enviarComando('STOP')">
        STOP
        </button>

        <button class="big-btn orange"
        onclick="enviarComando('RESET')">
        RESET
        </button>

        <button class="big-btn blue"
        onclick="enviarComando('AUTO')">
        AUTO
        </button>

      </div>

      <div class="tank">

        <div class="liquid" id="tankLiquid"></div>

        <div class="tank-label" id="tankLabel">
          0%
        </div>

      </div>

    </div>

  </div>

</div>

<script>

// ============================================
// RELOGIO
// ============================================

function updateClock(){

  const now = new Date();

  document.getElementById('clock').innerHTML =
  now.toLocaleTimeString();
}

setInterval(updateClock,1000);

updateClock();

// ============================================
// LOGIN
// ============================================

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbyknrxg1qQvwCe-EUYE1l8nRmWkCTDHuGibkzgOGbhFRYzlR-_iPEGpUDbmQryVAfd-/exec';

let topicos = {};
let client = null;

async function fazerLogin(){

  const nome =
  document.getElementById('nome').value;

  const senha =
  document.getElementById('senha').value;

  try{

    const resposta = await fetch(
      SCRIPT_URL +
      '?nome=' + encodeURIComponent(nome) +
      '&senha=' + encodeURIComponent(senha)
    );

    const dados = await resposta.json();

    console.log(dados);

    if(dados.status !== 'OK'){

      alert('Login inválido');

      return;
    }

    document.getElementById('login').style.display =
    'none';

    document.getElementById('painel').style.display =
    'block';

    document.getElementById('localNome').innerHTML =
    dados.local;

    iniciarMQTT(dados);

  }catch(erro){

    alert('Erro ao conectar');

    console.error(erro);
  }
}

// ============================================
// LOGOFF
// ============================================

function logout(){

  if(client){

    client.end();

    console.log('MQTT desconectado');
  }

  topicos = {};

  document.getElementById('painel').style.display =
  'none';

  document.getElementById('login').style.display =
  'flex';

  document.getElementById('nome').value = '';

  document.getElementById('senha').value = '';

  document.getElementById('temp').innerHTML = '0';

  document.getElementById('press').innerHTML = '0';

  document.getElementById('flow').innerHTML = '0';

  document.getElementById('level').innerHTML = '0';

  document.getElementById('tankLabel').innerHTML =
  '0%';

  document.getElementById('tankLiquid').style.height =
  '0%';

  chart.data.labels = [];

  chart.data.datasets[0].data = [];

  chart.update();

  alert('Logout realizado');
}

// ============================================
// MQTT
// ============================================

function iniciarMQTT(dados){

  topicos = {

    temperatura: dados.mqtt1,
    pressao: dados.mqtt2,
    vazao: dados.mqtt3,
    nivel: dados.mqtt4,

    bomba1: dados.mqtt11,
    bomba2: dados.mqtt12,

    sliderSalvar: dados.mqtt12,
    sliderSalvo: dados.mqtt2,

    comandos: dados.mqtt20
  };

  client = mqtt.connect(
    'wss://broker.hivemq.com:8884/mqtt'
  );

  client.on('connect',()=>{

    console.log('MQTT conectado');

    client.subscribe(Object.values(topicos));
  });

  client.on('message',(topic,message)=>{

    const valor = message.toString();

    console.log(topic,valor);

    if(topic === topicos.temperatura){

      document.getElementById('temp').innerHTML =
      valor;

      adicionarGrafico(valor);
    }

    if(topic === topicos.pressao){

      document.getElementById('press').innerHTML =
      valor;
    }

    if(topic === topicos.vazao){

      document.getElementById('flow').innerHTML =
      valor;
    }

    if(topic === topicos.nivel){

      document.getElementById('level').innerHTML =
      valor;

      document.getElementById('tankLabel').innerHTML =
      valor + '%';

      document.getElementById('tankLiquid').style.height =
      valor + '%';
    }

  });
}

// ============================================
// GRAFICO
// ============================================

const ctx =
document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx,{

  type:'line',

  data:{

    labels:[],

    datasets:[{

      label:'Temperatura',

      data:[],

      borderColor:'#22d3ee',

      backgroundColor:'rgba(34,211,238,0.2)',

      borderWidth:3,

      tension:0.4,

      fill:true
    }]
  },

  options:{

    responsive:true,

    maintainAspectRatio:false
  }
});

function adicionarGrafico(valor){

  chart.data.labels.push(
    new Date().toLocaleTimeString()
  );

  chart.data.datasets[0].data.push(valor);

  if(chart.data.labels.length > 20){

    chart.data.labels.shift();

    chart.data.datasets[0].data.shift();
  }

  chart.update();
}

// ============================================
// COMANDOS
// ============================================

function updateSlider(valor){

  document.getElementById('sliderValue').innerHTML =
  valor + '%';

  if(client){

    client.publish(
      topicos.sliderSalvar,
      valor.toString()
    );
  }
}

function enviarComando(comando){

  if(client){

    client.publish(
      topicos.comandos,
      comando
    );
  }
}

function toggleMachine(id){

  const el = document.getElementById(id);

  el.classList.toggle('off');

  let estado =
  el.classList.contains('off') ? '0' : '1';

  if(client){

    if(id === 'm1'){

      client.publish(
        topicos.bomba1,
        estado
      );
    }

    if(id === 'm2'){

      client.publish(
        topicos.bomba2,
        estado
      );
    }
  }
}

</script>

</body>
</html>
